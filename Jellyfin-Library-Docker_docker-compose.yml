services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    group_add:
      - "110" # Change this to match your "render" host group id and remove this comment
    network_mode: 'host'
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: /mnt/NAS/Documents/Videos
        target: /mnt/Videos
        read_only: true
      - type: bind
        source: /mnt/NAS/Documents/Music
        target: /mnt/Musics
        read_only: true
      - type: bind
        source: "/mnt/NAS/Documents/CDリッピング(flac)/"
        target: /mnt/CD-flac
        read_only: true
    devices:
      - /dev/dri:/dev/dri
    restart: 'unless-stopped'
    # Optional - alternative address used for autodiscovery
    environment:
      - JELLYFIN_PublishedServerUrl=http://oooooooooo.xxxxxxxxxx.ts.net
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    extra_hosts:
      - 'host.docker.internal:host-gateway'